<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat Widget</title>
  <style>
    /* Simple widget styling */
    #chat-widget {
      width: 350px;
      height: 450px;
      border: 1px solid #ccc;
      padding: 10px;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .message {
      margin: 5px 0;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .user { background-color: #d1e7ff; align-self: flex-end; }
    .ai { background-color: #e2e2e2; align-self: flex-start; }
    #chat-form {
      display: flex;
    }
    #chat-input {
      flex: 1;
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    #chat-submit {
      margin-left: 5px;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <div id="chat-widget">
    <div id="messages"></div>
    <form id="chat-form">
      <input type="text" id="chat-input" placeholder="Type your message..." required />
      <button type="submit" id="chat-submit">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');

    // Unique ID for this chat session (could also come from server later)
    const threadId = `thread_${Math.random().toString(36).substring(2, 10)}`;

    // Helper: Append message to widget
    function addMessage(text, sender) {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${sender}`;
      msgEl.textContent = text;
      messagesEl.appendChild(msgEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // -------------------------------
    // Send message to server (API)
    // -------------------------------
    async function sendMessage(text) {
      addMessage(text, 'user');
      chatInput.value = '';
      try {
        console.log('Sending message to /api/chat:', text);
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, thread_id: threadId })
        });
        const data = await res.json();
        console.log('Server response:', data);
        if (data.status === 'sent to Make webhook') {
          addMessage('Message sent! Waiting for AI response...', 'ai');
        }
      } catch (err) {
        console.error('Send error:', err);
        addMessage('Error sending message. Check console.', 'ai');
      }
    }

    // -------------------------------
    // Poll for AI responses
    // -------------------------------
    async function pollResponses() {
      try {
        const res = await fetch(`/api/get_ai_responses?thread_id=${threadId}`);
        const data = await res.json();
        console.log('Polled AI responses:', data);

        if (Array.isArray(data)) {
          data.forEach(msg => {
            if (!msg.displayed) {
              addMessage(msg.message, 'ai');
              msg.displayed = true; // mark as shown to avoid duplicates
            }
          });
        }
      } catch (err) {
        console.error('Polling error:', err);
      }
    }

    // -------------------------------
    // Poll every 2 seconds
    // -------------------------------
    setInterval(pollResponses, 2000);

    // -------------------------------
    // Form submission
    // -------------------------------
    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (text) sendMessage(text);
    });

  </script>
</body>
</html>
