<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat Widget</title>
  <style>
    #chat-box { border: 1px solid #ccc; padding: 10px; width: 300px; height: 400px; overflow-y: auto; }
    .user { color: blue; margin-bottom: 5px; }
    .ai { color: green; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div id="chat-box"></div>
  <form id="chat-form">
    <input type="text" id="message-input" placeholder="Type a message" required />
    <button type="submit">Send</button>
  </form>

  <script>
    const chatBox = document.getElementById("chat-box");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");

    // For demo, generate a thread ID per session
    const threadId = "thread_" + Math.random().toString(36).substr(2, 9);

    // Track last seen AI response ID to avoid duplicates
    let lastSeenAIId = 0;

    // Send message to chat.js / Make webhook
    async function sendMessage(text) {
      appendMessage("user", text);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, thread_id: threadId })
        });

        const data = await res.json();
        console.log("Server response:", data);
        messageInput.value = "";
      } catch (err) {
        console.error("Fetch error:", err);
      }
    }

    // Poll Google Sheets / Make scenario for new AI messages
    async function pollAIResponses() {
      try {
        // Replace this URL with your Make scenario endpoint that returns latest AI messages
        const pollUrl = `/api/get_ai_responses?thread_id=${threadId}&after_id=${lastSeenAIId}`;

        const res = await fetch(pollUrl);
        const data = await res.json();

        if (data && data.messages && data.messages.length > 0) {
          data.messages.forEach(msg => {
            appendMessage("ai", msg.text);
            lastSeenAIId = Math.max(lastSeenAIId, msg.id); // track last seen
          });
        }
      } catch (err) {
        console.error("Polling error:", err);
      }
    }

    function appendMessage(sender, text) {
      const div = document.createElement("div");
      div.className = sender;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Form submission
    chatForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (text) sendMessage(text);
    });

    // Start polling every 2 seconds
    setInterval(pollAIResponses, 2000);
  </script>
</body>
</html>
